/auth/google:
  post:
    summary: Authenticate user with Google and return access token and authetication cookie
    operationId: authenticateWithGoogle
    tags:
      - Auth
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - token
            properties:
              token:
                type: string
                description: Google ID token issued by client
    responses:
      200:
        description: Authentication successful
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiSuccess'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        user:
                          $ref: '#/components/schemas/User'
                        accessToken:
                          type: string
                        refreshToken:
                          type: string
      401:
        description: Invalid or expired Google token
/auth/refresh:
  post:
    summary: Refresh access token using refresh token cookie
    operationId: refreshAccessToken
    tags:
      - Auth
    parameters:
      - in: cookie
        name: refreshToken
        description: Refresh token stored in HTTP-only cookie
        required: true
        schema:
          type: string
    responses:
      200:
        description: New access token generated successfully
        headers:
          Set-Cookie:
            description: Sets a new refresh token cookie
            schema:
              type: string
              example: refreshToken=NEW_REFRESH_TOKEN; HttpOnly; Secure; SameSite=Strict; Max-Age=25200000
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiSuccess'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        accessToken:
                          type: string
                        refreshToken:
                          type: string
      401:
        description: Invalid or expired refresh token
/auth/logout:
  post:
    summary: Logout user by clearing cookies and refresh token
    operationId: logoutUser
    tags:
      - Auth
    parameters:
      - in: cookie
        name: refreshToken
        description: Refresh token stored in HTTP-only cookie
        required: true
        schema:
          type: string
    responses:
      200:
        description: Successfully logged out user
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiSuccess'
                - type: object
      401:
        description: Invalid or expired refresh token
/auth/me:
  get:
    summary: Fetch user data using access token
    operationId: getMe
    tags:
      - Auth
    security:
      - bearerAuth: []
    responses:
      200:
        description: User retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiSuccess'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        user:
                          $ref: '#/components/schemas/User'
      401:
        description: Invalid token or unauthorized