/teams/{teamId}/projects:
  post:
    summary: Create a project and return project info
    operationId: createProject
    tags:
      - Projects
    security:
      - bearerAuth: []
    parameters:
      - name: teamId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                description: Project Name
              description:
                type: string
                description: Project description
              start_date:
                type: string
                format: date
                example: 2025-12-31
                description: Project Start Date
              end_date:
                type: string
                format: date
                example: 2026-12-31
                description: Project Start Date
    responses:
      201:
        description: Project created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiSuccess"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        project:
                          $ref: "#/components/schemas/Project"
      400:
        description: Invalid request or input
      401:
        description: Invalid token or unauthorized
      500:
        description: Internal server error
  get:
    summary: Get all projects for a team
    operationId: getTeamProjects
    tags:
      - Projects
    security:
      - bearerAuth: []
    parameters:
      - name: teamId
        in: path
        required: true
        schema:
          type: string
    responses:
      200:
        description: Projects retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiSuccess"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        projects:
                          type: array
                          items:
                            $ref: "#/components/schemas/Project"
      401:
        description: Invalid token or unauthorized
      500:
        description: Internal server error
