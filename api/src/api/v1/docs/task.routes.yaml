/projects/{projectId}/tasks:
  post:
    summary: Create a task and return the task info
    operationId: createTask
    tags:
      - Tasks
    security:
      - bearerAuth: []
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - startDate
              - endDate
            properties:
              name:
                type: string
                example: "Complete the Swagger Doc for Task Endpoint"
              status:
                type: string
                enum:
                  - OPEN
                  - IN_PROGRESS
                  - COMPLETED
                  - BLOCKED
              startDate:
                type: string
                format: date
                example: 2025-12-01
              endDate:
                type: string
                format: date
                example: 2026-01-01
              assigneeId:
                type: string
                format: uuid
                example: 550e8400-e29b-41d4-a716-446655540000
              parentTaskId:
                type: string
                format: uuid
                example: 550e8400-e29b-41d4-a716-546655540000
    responses:
      201:
        description: Task created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiSuccess"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        task:
                          $ref: "#/components/schemas/Task"
      400:
        description: Invalid request or input
      401:
        description: Invalid token or unauthorized
      500:
        description: Internal server error
  get:
    summary: Get a list of tasks that belongs to a project
    operationId: getTasks
    tags:
      - Tasks
    security:
      - bearerAuth: []
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
    responses:
      201:
        description: Task created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiSuccess"
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        tasks:
                          type: array
                          items:
                            $ref: "#/components/schemas/Task"
      400:
        description: Invalid request or input
      401:
        description: Invalid token or unauthorized
      500:
        description: Internal server error
